name: CI to DockerHub

on: [push]

jobs: 
    lint-and-test:
        runs-on: ubuntu-latest

        steps:

        - name: Checkout Code
          uses: actions/checkout@v2

        - name: Set up Python
          uses: actions/setup-python@v5
          with: 
            python-version: "3.12"

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install pytest
            pip install flake8

        - name: Run linting
          run: flake8 .

        - name: Run tests
          run: pytest



    login-and-upload: 
        runs-on: ubuntu-latest

        steps:

        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with: 
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}

        - name: Checkout Code
          uses: actions/checkout@v2

        - name: Building Docker image
          run: docker build -t tahmidachoudhury/task-1:latest .

        - name: Pushing Docker image to Registry
          run: docker push tahmidachoudhury/task-1:latest

        - name: Notify success
          if: success()
          run: echo "Pipeline passed successfully - image built and pushed"

        needs: [lint-and-test]