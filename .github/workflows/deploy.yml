name: CI to DockerHub

on: [push]

jobs: 
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Code
          uses: actions/checkout@v2
        
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with: 
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
        
        - name: Confirm
          run: echo It worked!